<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>URUNABI | THE RUSTY GARAGE</title>
<style>
:root{--black:#050505;--panel:#151515;--line:rgba(255,255,255,.12);--ivory:#f5f0e8;--steel:#aaa39b;--gold:#e1bd72;--red:#d82116}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,rgba(199,164,93,.14),transparent 34rem),linear-gradient(180deg,#050505,#0d0d0d 48%,#050505);color:var(--ivory);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{width:min(100% - 40px,760px);margin:0 auto}.wide{width:min(100% - 40px,1160px);margin:0 auto}.brand{text-align:center;padding:38px 0 34px}.brand h1{margin:0;color:#fff;font-size:48px;letter-spacing:.18em;font-weight:950}.brand p{margin:10px 0 0;color:var(--steel);font-size:12px;letter-spacing:.34em;font-weight:800}.hero{min-height:calc(100vh - 150px);display:flex;flex-direction:column;justify-content:center;padding-bottom:44px}.eyebrow{color:var(--gold);font-size:12px;letter-spacing:.22em;font-weight:900}.leadbox{border-left:1px solid rgba(225,189,114,.75);padding-left:22px;margin-bottom:36px}.leadbox h2{font-size:clamp(38px,8vw,68px);line-height:1.08;margin:18px 0 0;font-weight:950;color:#fff}.leadbox p,.muted{color:var(--steel);line-height:1.9}.buttons{display:grid;gap:14px}.btn{min-height:58px;border-radius:8px;border:1px solid transparent;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;font-weight:950;letter-spacing:.08em;cursor:pointer;width:100%;font-size:15px}.primary{background:var(--gold);color:#000}.secondary{background:#fff;color:#000}.outline{background:rgba(255,255,255,.04);border-color:var(--line);color:var(--ivory)}.card{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:8px;box-shadow:0 0 60px rgba(199,164,93,.12);overflow:hidden}.content{padding:22px}.page-title{font-size:36px;margin:10px 0 0;color:#fff;font-weight:950}.form{display:grid;gap:18px}.label{display:block;font-weight:850;margin-bottom:8px}input{width:100%;min-height:54px;border-radius:8px;border:1px solid var(--line);background:rgba(0,0,0,.35);color:var(--ivory);font-size:16px;padding:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grade{border-color:rgba(225,189,114,.75);background:rgba(225,189,114,.1)}.grade-row{display:flex;gap:20px;align-items:flex-end}.grade-letter{font-size:82px;line-height:.9;color:var(--gold);font-weight:950}.big{font-size:26px;font-weight:950;color:#fff}.record{white-space:pre-wrap;max-height:330px;overflow:auto;border:1px solid var(--line);background:rgba(0,0,0,.35);border-radius:8px;padding:16px;line-height:1.65;color:var(--ivory)}.sales-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.sale{position:relative;aspect-ratio:1/1;background:#000;overflow:hidden}.sale:first-child{grid-column:span 2}.sale img{width:100%;height:100%;object-fit:cover;transition:.45s}.sale:hover img{transform:scale(1.05)}.shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.08),transparent)}.sold{position:absolute;top:14px;left:14px;background:var(--red);padding:6px 12px;border-radius:6px;color:#fff;font-size:12px;font-weight:950;letter-spacing:.16em}.caption{position:absolute;left:18px;right:18px;bottom:18px}.caption h3{margin:6px 0 0;font-size:24px;line-height:1.1}.smallcaps{font-size:12px;color:var(--gold);font-weight:900;letter-spacing:.16em}.toast{font-size:12px;color:var(--gold);font-weight:850;text-align:right}@media(max-width:760px){.brand h1{font-size:38px}.grid2,.sales-grid{grid-template-columns:1fr}.sale:first-child{grid-column:auto}.wrap,.wide{width:min(100% - 28px,760px)}.leadbox h2{font-size:40px}}@media(min-width:760px){.buttons.triple{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="brand"><h1>URUNABI</h1><p>BY THE RUSTY GARAGE</p></div>
<main id="app"></main>
<script>
const sales=[['HONDA MAGNA50','IMG_5150.jpg'],['SUZUKI GS50','IMG_5151.jpg'],['Yamaha YZF-R25','IMG_5152.jpg'],['Yamaha Mint','IMG_5154.jpg'],['Suzuki Let\'s 2','IMG_5155.jpg'],['Honda Z50','IMG_5156.jpg'],['Honda AF16','IMG_5157.jpg'],['SUZUKI Let\'s2 pallet','IMG_5158.jpg'],['YAMAHA VINO','IMG_5159.jpg'],['HONDA CREA SCOOPY','IMG_5160.jpg'],['HONDA V-TWIN MAGNA 1999','IMG_5161.jpg'],['KAWASAKI ELIMINATOR250LX 1993','IMG_5162.jpg'],['SUZUKI Grasstracker 250 2000','IMG_5163.jpg'],['SUZUKI GSX-R1100 1993','IMG_5164.jpg'],['YAMAHA XV250 1987','IMG_5165.jpg'],['KAWASAKI ELIMINATOR125 1999','IMG_5166.jpg'],['HONDA MC13 1985','IMG_5167.jpg'],['YAMAHA XV250 1994','IMG_5168.jpg'],['HONDA GB250 1983','IMG_5169.jpg']];
const lineUrl='https://lin.ee/zBWaJiv';const instagramUrl='https://www.instagram.com/therusty_garage?igsh=MWFhYXVjMGlpOWp5YQ%3D%3D&utm_source=qr';const app=document.getElementById('app');const state={input:{}};
function esc(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function parseNum(v){const n=Number(String(v||'').replace(/[^0-9]/g,''));return Number.isFinite(n)?n:0}
function diagnose(input){const m=(input.model||'').toLowerCase();const jp=input.model||'';let score=20;let reasons=[];if(/magna|jazz|monkey|z50|gs50|sr|gb/.test(m)||/マグナ/.test(jp)){score+=34;reasons.push('指名買いされやすい車種傾向があり、委託販売で魅力を伝えやすいです。')}else if(/harley|davidson|dragstar|xv|eliminator/.test(m)){score+=30;reasons.push('雰囲気やカスタムの見せ方で買い手の反応を取りやすいタイプです。')}else if(/r25|yzf|gsx|ninja|cbr/.test(m)){score+=26;reasons.push('スポーツ系は年式・外装状態・メンテナンス履歴で評価が分かれやすいです。')}else{score+=18;reasons.push('車種の詳細次第で評価が変わるため、写真と状態確認をもとに相談するのがおすすめです。')}const y=parseNum(input.year),age=y>1900?(new Date().getFullYear()-y):12,mileage=parseNum(input.mileage);if(age>=20){score+=16;reasons.push('古い年式でも、趣味性のある車両は探している買い手に届く可能性があります。')}else if(age<=8){score+=12;reasons.push('比較的新しい年式のため、状態が良ければ安心材料になります。')}else{score+=8;reasons.push('年式は標準的で、状態説明の分かりやすさが反応を左右します。')}if(mileage>0&&mileage<=20000){score+=16;reasons.push('走行距離は見せやすい範囲で、写真と整備情報があると強みになります。')}else if(mileage<=40000){score+=9;reasons.push('走行距離は大きなマイナスになりにくく、整備履歴があると安心です。')}else{score+=3;reasons.push('走行距離が多めのため、エンジン状態や整備履歴の説明が重要です。')}if((input.custom||'').trim()){score+=12;reasons.push('カスタム内容があるため、好みに合う買い手へ刺さる可能性があります。')}else{score+=6;reasons.push('ノーマル寄りの車両は幅広い買い手に検討されやすいです。')}const grade=score>=78?'A':score>=58?'B':'C';return{grade,label:grade==='A'?'委託販売おすすめ':grade==='B'?'委託販売を検討しやすい':'状態確認してから相談',range:score>=78?'相場より高めを狙える可能性あり':score>=58?'標準からやや高めで相談可能':'状態確認後に慎重に価格設定',fit:grade==='A'?'買取より委託販売の方が魅力を伝えやすい車両です。':grade==='B'?'写真と状態説明を整えることで、委託販売の可能性があります。':'まずは現車状態を確認して、無理のない売り方を決めるのがおすすめです。',reasons,points:['外装の傷・サビ・塗装状態','エンジン始動性とアイドリングの安定感','カスタム内容と純正部品の有無','タイヤ・ブレーキ・灯火類などの消耗品','車両全体が分かる明るい写真']}}
function recordText(input,d){return ['URUNABI 売れやすさ診断 控え','',`車種: ${input.model||'-'}`,`年式: ${input.year||'-'}`,`走行距離: ${input.mileage||'-'}`,`カスタム内容: ${input.custom||'なし / 未入力'}`,`希望売却価格: ${input.price||'-'}`,'',`診断ランク: ${d.grade} / ${d.label}`,`参考レンジ: ${d.range}`,`診断コメント: ${d.fit}`,'','理由:',...d.reasons.map(x=>'- '+x),'','確認したいポイント:',...d.points.map(x=>'- '+x)].join('\n')}
function home(){app.className='wrap';app.innerHTML=`<section class="hero"><div class="leadbox"><p class="eyebrow">CONSIGNMENT SALE</p><h2>愛車、買取価格で売ってませんか？</h2><p>URUNABIは、THE RUSTY GARAGEが運営するバイク委託販売サポートアプリです。</p></div><div class="buttons"><a class="btn primary" href="#assessment">無料で査定する</a><a class="btn outline" href="#bikes">委託販売中のバイクを見る</a><a class="btn outline" href="#sales">売却実績を見る</a></div></section>`}
function assessment(){app.className='wrap';app.innerHTML=`<section><p class="eyebrow">FREE ASSESSMENT</p><h2 class="page-title">無料査定フォーム</h2><p class="muted">売却予定のバイク情報を入力してください。送信後に売れやすさ診断を表示します。</p><div class="card"><div class="content"><form id="form" class="form"><label><span class="label">車種</span><input name="model" placeholder="例：HONDA MAGNA50" required></label><label><span class="label">年式</span><input name="year" placeholder="例：1995年" required></label><label><span class="label">走行距離</span><input name="mileage" placeholder="例：17,000km" required></label><label><span class="label">カスタム内容</span><input name="custom" placeholder="例：アップハンドル、フェンダー"></label><label><span class="label">希望売却価格</span><input name="price" placeholder="例：180,000円"></label><label><span class="label">写真アップロード</span><input type="file" accept="image/*"></label><button class="btn primary" type="submit">診断結果を見る</button></form></div></div></section>`;document.getElementById('form').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);state.input=Object.fromEntries(['model','year','mileage','custom','price'].map(k=>[k,fd.get(k)||'']));location.hash='result'}}
function result(){const input=state.input.model?state.input:{};const d=diagnose(input);const txt=recordText(input,d);app.className='wrap';app.innerHTML=`<section><p class="eyebrow">SELLABILITY CHECK</p><h2 class="page-title">売れやすさ診断</h2><p class="muted">入力された車両情報から、委託販売との相性を診断します。金額は断定せず、相談前の目安として見てください。</p><div class="card grade"><div class="content"><p class="eyebrow">CONSIGNMENT GRADE</p><div class="grade-row"><div class="grade-letter">${d.grade}</div><div><div class="big">${d.label}</div><p>${d.fit}</p></div></div></div></div><div class="card" style="margin-top:16px"><div class="content"><p class="eyebrow">VEHICLE</p><h3 class="big">${esc(input.model)||'車種未入力'}</h3><div class="grid2"><p><b class="muted">年式</b><br>${esc(input.year)||'-'}</p><p><b class="muted">走行距離</b><br>${esc(input.mileage)||'-'}</p></div><p><b class="muted">カスタム内容</b><br>${esc(input.custom)||'なし / 未入力'}</p></div></div><div class="card" style="margin-top:16px"><div class="content"><p class="eyebrow">参考レンジ</p><div class="big">${d.range}</div></div></div><div class="card" style="margin-top:16px"><div class="content"><p class="eyebrow">診断理由</p><ul>${d.reasons.map(x=>`<li>・${x}</li>`).join('')}</ul></div></div><div class="card" style="margin-top:16px"><div class="content"><p class="eyebrow">本査定前に確認したいポイント</p><ul>${d.points.map(x=>`<li>・${x}</li>`).join('')}</ul></div></div><div class="card" style="margin-top:16px"><div class="content"><p class="eyebrow">保存用の診断控え</p><p class="muted">入力内容と診断結果をまとめて残せます。</p><pre class="record">${txt}</pre><p id="toast" class="toast"></p><div class="buttons triple"><button class="btn outline" id="copy">控えをコピー</button><button class="btn secondary" id="text">テキスト保存</button><button class="btn primary" id="png">画像で保存</button></div></div></div><div class="buttons" style="margin-top:24px"><a class="btn primary" href="${lineUrl}">LINEで本査定する</a><a class="btn outline" href="#sales">販売実績を見る</a><a class="btn outline" href="${instagramUrl}">Instagramで相談する</a><a class="btn secondary" href="#home">トップに戻る</a></div></section>`;document.getElementById('copy').onclick=async()=>{await navigator.clipboard.writeText(txt);document.getElementById('toast').textContent='コピーしました'};document.getElementById('text').onclick=()=>download('urunabi-diagnosis.txt','text/plain;charset=utf-8',txt);document.getElementById('png').onclick=()=>savePng(txt,d.grade)}
function download(name,type,content){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}function savePng(txt,grade){const c=document.createElement('canvas');c.width=1080;c.height=1350;const x=c.getContext('2d');x.fillStyle='#050505';x.fillRect(0,0,c.width,c.height);x.fillStyle='#e1bd72';x.font='900 38px sans-serif';x.fillText('URUNABI 診断控え',70,90);x.fillStyle='#fff';x.font='900 140px sans-serif';x.fillText(grade,70,245);x.font='28px sans-serif';let y=330;txt.split('\n').forEach(line=>{if(y<1280){x.fillText(line.slice(0,42),70,y);y+=42}});const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='urunabi-diagnosis.png';a.click()}
function salesPage(){app.className='wide';app.innerHTML=`<section><div style="text-align:center"><p class="eyebrow">SOLD OUT ARCHIVE</p><h2 class="page-title">売却実績</h2><p class="muted">実際の販売実績画像をもとにしたアーカイブです。</p></div><div class="sales-grid">${sales.map(s=>`<article class="card sale"><img src="sales/${s[1]}" alt="${s[0]}"><div class="shade"></div><span class="sold">SOLD OUT</span><div class="caption"><p class="smallcaps">THE RUSTY GARAGE</p><h3>${s[0]}</h3></div></article>`).join('')}</div><div class="buttons" style="margin:28px auto;max-width:680px"><a class="btn primary" href="#assessment">無料で査定する</a><a class="btn outline" href="#home">トップに戻る</a></div></section>`}
function bikes(){app.className='wrap';app.innerHTML=`<section><p class="eyebrow">LISTINGS</p><h2 class="page-title">委託販売中バイク</h2><div class="card"><div class="content"><p class="muted">MVP表示です。販売中車両は今後追加できます。</p></div></div><div class="buttons" style="margin-top:24px"><a class="btn outline" href="#home">トップに戻る</a></div></section>`}
function render(){const h=(location.hash||'#home').replace('#','');if(h==='assessment')assessment();else if(h==='result')result();else if(h==='sales')salesPage();else if(h==='bikes')bikes();else home()}addEventListener('hashchange',render);render();
</script>
</body>
</html>
