<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>URUNABI</title><style>
body{margin:0;background:radial-gradient(circle at top,rgba(199,164,93,.14),transparent 34rem),#050505;color:#f5f0e8;font-family:system-ui,-apple-system,sans-serif}.brand{text-align:center;padding:38px 0}.brand h1{margin:0;font-size:48px;letter-spacing:.18em}.brand p{color:#aaa39b;font-size:12px;letter-spacing:.34em;font-weight:800}.wrap{width:min(100% - 36px,760px);margin:auto}.wide{width:min(100% - 36px,1160px);margin:auto}.hero{min-height:70vh;display:flex;flex-direction:column;justify-content:center}.lead{border-left:1px solid #e1bd72;padding-left:22px;margin-bottom:34px}.lead h2,.title{font-size:clamp(36px,7vw,64px);line-height:1.1;margin:12px 0;font-weight:950}.eyebrow{color:#e1bd72;font-size:12px;letter-spacing:.2em;font-weight:900}.muted{color:#aaa39b;line-height:1.8}.btns{display:grid;gap:14px}.btn{min-height:58px;border-radius:8px;border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:900;letter-spacing:.08em;cursor:pointer}.primary{background:#e1bd72;color:#000;border:0}.outline{background:rgba(255,255,255,.04);color:#f5f0e8}.secondary{background:#fff;color:#000}.card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);border-radius:8px;box-shadow:0 0 60px rgba(199,164,93,.12);overflow:hidden}.content{padding:22px}.form{display:grid;gap:18px}.label{display:block;font-weight:850;margin-bottom:8px}input{width:100%;min-height:54px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.35);color:#f5f0e8;font-size:16px;padding:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grade{border-color:rgba(225,189,114,.75);background:rgba(225,189,114,.1)}.letter{font-size:82px;line-height:.9;color:#e1bd72;font-weight:950}.big{font-size:26px;font-weight:950}.record{white-space:pre-wrap;max-height:300px;overflow:auto;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.35);border-radius:8px;padding:16px;line-height:1.65}.sales{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.sale{position:relative;aspect-ratio:1/1;background:linear-gradient(145deg,#171717,#050505);min-height:280px}.sale:first-child{grid-column:span 2}.sold{position:absolute;top:14px;left:14px;background:#d82116;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:950}.pill{position:absolute;top:14px;right:14px;border:1px solid rgba(225,189,114,.45);border-radius:99px;padding:6px 10px;color:#e1bd72;font-size:11px;font-weight:950}.cap{position:absolute;left:18px;right:18px;bottom:18px}.cap h3{font-size:24px;margin:6px 0 0}.svg{position:absolute;inset:70px 24px 86px}.line{stroke:#e1bd72;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;fill:none}.fill{fill:rgba(225,189,114,.16);stroke:#e1bd72;stroke-width:5}@media(max-width:760px){.grid2,.sales{grid-template-columns:1fr}.sale:first-child{grid-column:auto}.brand h1{font-size:38px}}
</style></head><body><div class="brand"><h1>URUNABI</h1><p>BY THE RUSTY GARAGE</p></div><main id="app"></main><script>
const app=document.getElementById('app');const lineUrl='https://lin.ee/zBWaJiv';const insta='https://www.instagram.com/therusty_garage?igsh=MWFhYXVjMGlpOWp5YQ%3D%3D&utm_source=qr';const state={input:{}};const cars=['HONDA MAGNA50','SUZUKI GS50','Yamaha YZF-R25','Yamaha Mint','Suzuki Let\'s 2','Honda Z50','Honda AF16','SUZUKI Let\'s2 pallet','YAMAHA VINO','HONDA CREA SCOOPY','HONDA V-TWIN MAGNA 1999','KAWASAKI ELIMINATOR250LX 1993','SUZUKI Grasstracker 250 2000','SUZUKI GSX-R1100 1993','YAMAHA XV250 1987','KAWASAKI ELIMINATOR125 1999','HONDA MC13 1985','YAMAHA XV250 1994','HONDA GB250 1983'];
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function num(v){const n=Number(String(v||'').replace(/[^0-9]/g,''));return Number.isFinite(n)?n:0}function type(n){n=n.toLowerCase();if(/magna|xv|eliminator|harley|dragstar/.test(n))return['AMERICAN','american'];if(/vino|scoopy|mint|let|af16|crea/.test(n))return['SCOOTER','scooter'];if(/yzf|gsx|r25|cbr|ninja/.test(n))return['SPORT','sport'];return['NAKED','naked']}function svg(t){if(t==='scooter')return `<svg class="svg" viewBox="0 0 420 180"><circle class="line" cx="105" cy="138" r="30"/><circle class="line" cx="304" cy="138" r="30"/><path class="line" d="M122 130h90c48 0 74-24 82-74M210 130c12-38 44-58 86-58M260 54h55l22-18M164 78h62"/><path class="fill" d="M130 86c48-34 112-20 130 34H104c2-13 10-25 26-34z"/></svg>`;if(t==='sport')return `<svg class="svg" viewBox="0 0 420 180"><circle class="line" cx="86" cy="138" r="32"/><circle class="line" cx="326" cy="138" r="32"/><path class="line" d="M115 132h78l64-62 62 62h16M176 128l-26-50h88M238 70h84l36-26"/><path class="fill" d="M140 78h142l-62 48H104z"/></svg>`;if(t==='american')return `<svg class="svg" viewBox="0 0 420 180"><circle class="line" cx="78" cy="136" r="34"/><circle class="line" cx="330" cy="136" r="34"/><path class="line" d="M105 132h84l42-44 52 44h42M166 132l-34-58h82l36 58M214 74h62l24-22"/><path class="fill" d="M128 80h98l-26 38h-92z"/></svg>`;return `<svg class="svg" viewBox="0 0 420 180"><circle class="line" cx="86" cy="138" r="32"/><circle class="line" cx="318" cy="138" r="32"/><path class="line" d="M116 132h88l42-44 54 44h20M160 132l-28-62h98l34 62M132 70h96"/><path class="fill" d="M134 72h100l-24 42h-88z"/></svg>`}
function diag(i){let s=20,m=(i.model||'').toLowerCase(),r=[];if(/magna|マグナ|jazz|monkey|z50|gs50|sr|gb/.test(m)||/マグナ/.test(i.model||'')){s+=34;r.push('指名買いされやすく、委託販売で魅力を伝えやすい車両です。')}else{s+=22;r.push('写真と状態説明で反応が変わりやすい車両です。')}const age=num(i.year)>1900?new Date().getFullYear()-num(i.year):12;if(age>=20){s+=16;r.push('古い年式でも趣味性があれば買い手に届く可能性があります。')}else{s+=10;r.push('年式と状態のバランスが見られます。')}const km=num(i.mileage);if(km>0&&km<=20000){s+=16;r.push('走行距離は見せやすい範囲です。')}else{s+=8;r.push('整備履歴があると安心材料になります。')}if((i.custom||'').trim()){s+=12;r.push('カスタム内容は好みが合う買い手に刺さる可能性があります。')}const g=s>=78?'A':s>=58?'B':'C';return{grade:g,label:g==='A'?'委託販売おすすめ':g==='B'?'委託販売を検討しやすい':'状態確認してから相談',up:g==='A'?'50,000〜100,000円UP':g==='B'?'30,000〜70,000円UP':'10,000〜40,000円UP',hope:num(i.price)>0?(g==='A'?'A':g==='B'?'B':'C'):'-',range:g==='A'?'相場より高めを狙える可能性あり':g==='B'?'標準からやや高めで相談可能':'状態確認後に慎重に価格設定',reasons:r,points:['外装の傷・サビ・塗装状態','エンジン始動性','カスタム内容と純正部品の有無','消耗品の状態','明るい写真']}}
function record(i,d){return ['URUNABI 売れやすさ診断 控え','',`車種: ${i.model||'-'}`,`年式: ${i.year||'-'}`,`走行距離: ${i.mileage||'-'}`,`カスタム内容: ${i.custom||'なし / 未入力'}`,`希望売却価格: ${i.price||'-'}`,'',`診断ランク: ${d.grade} / ${d.label}`,`買取より: ${d.up}`,`希望金額ランク: ${d.hope}`,`参考レンジ: ${d.range}`].join('\n')}
function home(){app.className='wrap';app.innerHTML=`<section class="hero"><div class="lead"><p class="eyebrow">CONSIGNMENT SALE</p><h2>愛車、買取価格で売ってませんか？</h2><p class="muted">URUNABIは、THE RUSTY GARAGEが運営するバイク委託販売サポートアプリです。</p></div><div class="btns"><a class="btn primary" href="#assessment">無料で査定する</a><a class="btn outline" href="#bikes">委託販売中のバイクを見る</a><a class="btn outline" href="#sales">売却実績を見る</a></div></section>`}
function assessment(){app.className='wrap';app.innerHTML=`<section><p class="eyebrow">FREE ASSESSMENT</p><h2 class="title">無料査定フォーム</h2><p class="muted">入力後に売れやすさ診断を表示します。</p><div class="card"><div class="content"><form id="f" class="form"><label><span class="label">車種</span><input name="model" required placeholder="例：マグナ50"></label><label><span class="label">年式</span><input name="year" required placeholder="例：1995年"></label><label><span class="label">走行距離</span><input name="mileage" required placeholder="例：17,000km"></label><label><span class="label">カスタム内容</span><input name="custom" placeholder="例：アップハンドル"></label><label><span class="label">希望売却価格</span><input name="price" placeholder="例：180,000円"></label><button class="btn primary">診断結果を見る</button></form></div></div></section>`;document.getElementById('f').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);state.input=Object.fromEntries(['model','year','mileage','custom','price'].map(k=>[k,fd.get(k)||'']));location.hash='result'}}
function result(){const i=state.input,d=diag(i),txt=record(i,d);app.className='wrap';app.innerHTML=`<section><p class="eyebrow">SELLABILITY CHECK</p><h2 class="title">売れやすさ診断</h2><div class="card grade"><div class="content"><p class="eyebrow">診断ランク</p><div class="letter">${d.grade}</div><div class="big">${d.label}</div></div></div><div class="grid2" style="margin-top:14px"><div class="card grade"><div class="content"><p class="eyebrow">買取より</p><div class="big">${d.up}</div></div></div><div class="card"><div class="content"><p class="eyebrow">希望金額ランク</p><div class="big">${d.hope}</div></div></div></div><div class="card" style="margin-top:14px"><div class="content"><p class="eyebrow">車両</p><div class="big">${esc(i.model)||'車種未入力'}</div><p class="muted">${esc(i.year)||'-'} / ${esc(i.mileage)||'-'}</p></div></div><div class="card" style="margin-top:14px"><div class="content"><p class="eyebrow">診断理由</p><ul>${d.reasons.map(x=>`<li>・${x}</li>`).join('')}</ul></div></div><div class="card" style="margin-top:14px"><div class="content"><p class="eyebrow">確認ポイント</p><ul>${d.points.map(x=>`<li>・${x}</li>`).join('')}</ul></div></div><div class="card" style="margin-top:14px"><div class="content"><p class="eyebrow">保存用控え</p><pre class="record">${txt}</pre><div class="btns"><button class="btn outline" onclick="navigator.clipboard.writeText(\`${txt}\`)">控えをコピー</button><button class="btn primary" onclick="savePng(\`${txt}\`, '${d.grade}')">画像で保存</button></div></div></div><div class="btns" style="margin-top:24px"><a class="btn primary" href="${lineUrl}">LINEで本査定する</a><a class="btn outline" href="#sales">販売実績を見る</a><a class="btn outline" href="${insta}">Instagramで相談する</a><a class="btn secondary" href="#home">トップに戻る</a></div></section>`}
function savePng(txt,g){const c=document.createElement('canvas');c.width=1080;c.height=1300;const x=c.getContext('2d');x.fillStyle='#050505';x.fillRect(0,0,1080,1300);x.fillStyle='#e1bd72';x.font='900 42px sans-serif';x.fillText('URUNABI 診断控え',70,90);x.fillStyle='#fff';x.font='900 150px sans-serif';x.fillText(g,70,250);x.font='30px sans-serif';let y=340;txt.split('\n').forEach(l=>{x.fillText(l,70,y);y+=46});const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='urunabi-diagnosis.png';a.click()}
function salesPage(){app.className='wide';app.innerHTML=`<section><div style="text-align:center"><p class="eyebrow">SOLD OUT ARCHIVE</p><h2 class="title">売却実績</h2><p class="muted">車両名からタイプを判定したシルエット表示です。</p></div><div class="sales">${cars.map(n=>{const t=type(n);return `<article class="card sale"><span class="sold">SOLD OUT</span><span class="pill">${t[0]}</span>${svg(t[1])}<div class="cap"><p class="eyebrow">THE RUSTY GARAGE</p><h3>${n}</h3></div></article>`}).join('')}</div><div class="btns" style="margin:28px auto;max-width:680px"><a class="btn primary" href="#assessment">無料で査定する</a><a class="btn outline" href="#home">トップに戻る</a></div></section>`}
function bikes(){app.className='wrap';app.innerHTML='<section><p class="eyebrow">LISTINGS</p><h2 class="title">委託販売中バイク</h2><div class="card"><div class="content"><p class="muted">販売中車両は今後追加できます。</p></div></div><div class="btns" style="margin-top:24px"><a class="btn outline" href="#home">トップに戻る</a></div></section>'}
function render(){const h=(location.hash||'#home').slice(1);if(h==='assessment')assessment();else if(h==='result')result();else if(h==='sales')salesPage();else if(h==='bikes')bikes();else home()}addEventListener('hashchange',render);render();
</script></body></html>
